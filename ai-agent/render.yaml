services:
  - type: web
    name: resq-ai-backend
    runtime: python
    rootDir: .
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
